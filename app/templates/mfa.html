{% extends "base.html" %}
{% block title %}Multi-Factor Authentication{% endblock %}
{% block content %}
<h1>Multi-Factor Authentication</h1>
<form method="POST">
    {{ form.hidden_tag() }}
    <div>
        {{ form.token.label }}<br>
        {{ form.token(size=32) }}<br>
    </div>
    <div>
        {{ form.submit() }}
    </div>
</form>
{% endblock %}
