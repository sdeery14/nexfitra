{% extends "base.html" %}
{% block title %}Verify MFA{% endblock %}
{% block content %}
<h1>Verify MFA</h1>
<form method="POST" action="{{ url_for('routes.verify_mfa') }}">
    {{ form.hidden_tag() }}
    <div>
        {{ form.token.label }}<br>
        {{ form.token(size=32) }}<br>
    </div>
    <div>
        {{ form.submit() }}
    </div>
</form>
{% endblock %}
